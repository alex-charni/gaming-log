@let fieldId = id();
@let fieldLabel = label() | translate;
@let class = classes();

<app-form-field-layout
  [field]="field()"
  [label]="fieldLabel"
  [id]="fieldId"
  [textAlign]="textAlign()"
  [displayAsterisk]="displayAsterisk()"
  [displayErrors]="displayErrors()"
  [reserveSpaceForErrors]="reserveSpaceForErrors()"
>
  @if (isSelect()) {
    <select
      [id]="fieldId"
      class="form-field__input"
      [class]="class"
      [formField]="field"
      [attr.aria-label]="fieldLabel"
    >
      @for (option of options(); track option.value) {
        <option [value]="option.value">{{ option.label | translate }}</option>
      }
    </select>
  } @else {
    <input
      [id]="fieldId"
      [type]="type()"
      class="form-field__input"
      [class]="class"
      [formField]="field"
      [placeholder]="placeholder()"
      [attr.aria-label]="fieldLabel"
    />
  }
</app-form-field-layout>
