<ul class="menu__list">
  @for (item of items(); track item.label) {
    <li class="menu__item" [class.menu__item--visible]="isMenuOpen()" (click)="handleClick(item.route)">
      <button type="button" class="button">{{ item.label | translate }}</button>

      <span aria-hidden="true">
        <i class="icon fa-solid {{ item.icon }} fa-lg"></i>
      </span>
    </li>
  }
</ul>
