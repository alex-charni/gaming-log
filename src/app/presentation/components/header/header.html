<div id="app-header-wrapper" class="layout-wrapper" [class.layout-wrapper--visible]="isVisible()">
  <header id="app-header" class="app-header">
    <div class="app-header__container">
      <div class="app-header__brand" [routerLink]="'/home'">
        <img
          class="app-header__image"
          src="assets/media/images/logos/main-logo.svg"
          alt="App logo"
        />

        @if (isHome()) {
          <h1 class="app-header__title">{{ 'app.title' | translate }}</h1>
        } @else {
          <div class="app-header__title">{{ 'app.title' | translate }}</div>
        }
      </div>

      <div class="app-header__menu">
        <app-burger-menu />
      </div>
    </div>
  </header>
</div>
