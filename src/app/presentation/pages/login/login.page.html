<app-page-layout [contentMaxSize]="'sm'" [centerVertically]="true" [showHeader]="false">
  <section class="auth">
    <app-content-card-layout
      [width]="'sm'"
      [icon]="icon()"
      [title]="title() | translate"
      [titleLevel]="'h1'"
    >
      @if (isLoggedIn()) {
        <app-button [type]="'button'" [width]="'50%'" (action)="onLogout()">
          {{ 'common.logout' | translate }}
        </app-button>
      } @else {
        <form class="form" (submit)="onSubmit($event)">
          <app-form-field
            type="email"
            id="email"
            [label]="'forms.email' | translate"
            [field]="loginForm.email()"
          />

          <app-form-field
            type="password"
            id="password"
            [label]="'forms.password' | translate"
            [field]="loginForm.password()"
          />

          <app-button type="submit" [width]="'50%'" [disabled]="loginForm().invalid()">
            {{ 'common.login' | translate }}
          </app-button>
        </form>
      }
    </app-content-card-layout>
  </section>
</app-page-layout>
