<app-page-layout>
  <section class="page__hero">
    <app-hero-slider [slides]="store.slidesCollection()" [isLoading]="store.slidesAreLoading()" />
  </section>

  <div class="page__separator">
    <app-horizontal-separator [text]="'separator.already_finished_games' | translate" />
  </div>

  <section class="page__cards-grid">
    <app-game-cards-grid (loadMore)="handleFetchMoreGames()" />
  </section>
</app-page-layout>
