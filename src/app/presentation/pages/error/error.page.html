<main class="error-page">
  <section class="error-page__container">
    @if (code()) {
      <span class="code">{{ code() }}</span>
    } @else {
      <i class="icon fa-solid fa-exclamation"></i>
    }

    <h1 class="title">{{ title() }}</h1>
    <p class="message">{{ message() }}</p>

    @if (showButton()) {
      <app-button
        [type]="'button'"
        [text]="buttonText()"
        [width]="'50%'"
        (action)="handleButtonAction()"
      />
    }
  </section>
</main>
