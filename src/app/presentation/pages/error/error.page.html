<app-page-layout [contentMaxSize]="'sm'" [centerVertically]="true" [showHeader]="false">
  <section class="error">
    <app-content-card-layout
      [width]="'sm'"
      [icon]="icon()"
      [emphasizedText]="emphasizedText()"
      [title]="title()"
      [titleLevel]="'h1'"
    >
      <p class="message">{{ message() }}</p>

      @if (showButton()) {
        <app-button [type]="'button'" [width]="'50%'" (action)="handleButtonAction()">
          {{ buttonText() }}
        </app-button>
      }
    </app-content-card-layout>
  </section>
</app-page-layout>
