<main class="add-game-page">
  <section class="add-game-card">
    <i class="add-game-card__icon fa-solid fa-circle-plus"></i>

    <h1 class="add-game-card__title">{{ 'pages.admin.add_game.title' | translate }}</h1>

    <form class="add-game-form" (submit)="submit($event)">
      <div class="add-game-form__group">
        <app-form-field
          type="text"
          id="title"
          [label]="'common.title'"
          [field]="form.title()"
          [displayErrors]="false"
        />

        <app-form-field
          type="text"
          id="platform"
          [label]="'common.platform'"
          [field]="form.platform()"
          [displayErrors]="false"
        />

        <app-form-field
          type="date"
          id="date"
          [label]="'common.finished_date'"
          [field]="form.date()"
          [displayErrors]="false"
        />

        <app-form-field
          type="select"
          id="rating"
          [label]="'common.rating'"
          [field]="form.rating()"
          [options]="ratingOptions"
          [displayErrors]="false"
        />

        <app-form-field
          type="select"
          id="status"
          [label]="'common.status'"
          [field]="form.status()"
          [options]="statusOptions"
          [displayErrors]="false"
        />
      </div>

      <div class="add-game-form__group">
        <app-form-field type="text" id="id" [label]="'common.id'" [field]="form.id()" />

        <app-image-form-field
          id="cover"
          [label]="'common.cover' | translate"
          [field]="form.cover()"
          [selectText]="'pages.admin.add_game.select_cover'"
          [changeText]="'pages.admin.add_game.change_cover'"
        />
      </div>

      <div class="add-game-form__submit">
        <app-button
          [type]="'submit'"
          [text]="'pages.admin.add_game.save' | translate"
          [disabled]="form().invalid()"
        />
      </div>
    </form>
  </section>
</main>
